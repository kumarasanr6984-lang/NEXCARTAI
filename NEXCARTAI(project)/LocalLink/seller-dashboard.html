<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seller Dashboard | NexCartAI</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="assets/css/seller.css" />
    <link rel="stylesheet" href="assets/css/dashboard.css" />
    <link rel="stylesheet" href="assets/css/responsive.css" />
    <link rel="stylesheet" href="assets/css/darkmode.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <a class="brand" href="seller-dashboard.html">
          <span class="brand-mark">L</span>
          <span>NexCartAI</span>
        </a>
        <nav class="main-nav">
          <a href="seller-dashboard.html">Dashboard</a>
          <a href="seller-profile.html">Profile</a>
          <a href="reviews.html">Reviews</a>
          <a href="settings.html">Settings</a>
          <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle theme" onclick="window.toggleTheme()">🌙</button>
        </nav>
      </header>

      <main class="content-stack">
        <section class="section">
          <div class="section-head">
            <h2>Seller dashboard</h2>
            <a href="seller-profile.html" class="btn btn-secondary">View profile</a>
          </div>
          <div class="stats-grid" id="statsGrid"></div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2>My products</h2>
            <button class="btn btn-primary">Add product</button>
          </div>
          <div class="product-grid" id="sellerProducts"></div>
        </section>
      </main>
    </div>

    <script src="assets/js/storage.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/seller.js"></script>
    <script src="assets/js/dashboard.js"></script>
    <script src="assets/js/darkmode.js"></script>
  </body>
</html>
