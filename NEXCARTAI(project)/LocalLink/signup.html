<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create an account | NexCartAI</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="assets/css/login.css" />
    <link rel="stylesheet" href="assets/css/responsive.css" />
    <link rel="stylesheet" href="assets/css/darkmode.css" />
  </head>
  <body class="auth-page">
    <div class="auth-shell">
      <div class="auth-card">
        <a class="brand" href="index.html">
          <span class="brand-mark">L</span>
          <span>NexCartAI</span>
        </a>
        <h1>Join NexCartAI</h1>
        <p>Create a buyer or seller account and start exploring your local economy.</p>

        <form id="signupForm" class="form-stack">
          <label>
            I am a
            <select id="roleSelect">
              <option value="buyer">Buyer</option>
              <option value="seller">Seller</option>
            </select>
          </label>
          <label>
            Full name
            <input type="text" id="name" required />
          </label>
          <label>
            Email
            <input type="email" id="email" required />
          </label>
          <label>
            Password
            <input type="password" id="password" required />
          </label>
          <label>
            Location
            <input type="text" id="location" placeholder="Town / district" required />
          </label>
          <button class="btn btn-primary" type="submit">Create account</button>
        </form>

        <p class="auth-footnote">
          Already registered? <a href="login.html">Login</a>
        </p>
      </div>
    </div>

    <script src="assets/js/storage.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/signup.js"></script>
    <script src="assets/js/darkmode.js"></script>
  </body>
</html>
