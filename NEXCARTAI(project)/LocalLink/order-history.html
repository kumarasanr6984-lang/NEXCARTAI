<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connectors | NexCartAI</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="assets/css/buyer.css" />
    <link rel="stylesheet" href="assets/css/responsive.css" />
    <link rel="stylesheet" href="assets/css/darkmode.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <a class="brand" href="buyer-home.html">
          <span class="brand-mark">L</span>
          <span>NexCartAI</span>
        </a>
        <nav class="main-nav">
          <a href="buyer-home.html">Home</a>
          <a href="browse.html">Browse</a>
          <a href="wishlist.html">My Preference</a>
          <a href="connectors.html">Connectors</a>
        </nav>
      </header>

      <main class="content-stack">
        <section class="section">
          <div class="section-head">
            <h2>Your connectors</h2>
            <p class="lead">A simple view of the sellers you have connected with before.</p>
          </div>
          <div id="orderList"></div>
        </section>
      </main>
    </div>

    <script src="assets/js/storage.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/darkmode.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', async () => {
        const container = document.getElementById('orderList');
        const sellers = await fetchJson('data/sellers.json');
        const connectors = getConnectors();
        const connectedSellers = sellers.filter((seller) => connectors.includes(seller.name));

        if (!connectedSellers.length) {
          container.innerHTML = '<article class="info-card">You have not connected with any sellers yet.</article>';
          return;
        }

        container.innerHTML = connectedSellers.map((seller) => `
          <article class="seller-card">
            <img src="${seller.image}" alt="${seller.name}" />
            <h3>${seller.name}</h3>
            <p>${seller.location}</p>
            <div class="meta-row">
              <span>⭐ ${seller.rating}</span>
              <span>${seller.distance}</span>
            </div>
          </article>
        `).join('');
      });
    </script>
  </body>
</html>
